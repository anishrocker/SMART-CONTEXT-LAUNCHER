<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Context Launcher – Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #202124;
    }
    h1 { font-size: 1.25rem; }
    p { font-size: 14px; color: #5f6368; line-height: 1.5; }
    .kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f1f3f4;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Smart Context Launcher</h1>
  <p>Press <span class="kbd">⌘K</span> (Mac) or <span class="kbd">Ctrl+K</span> (Windows/Linux) on any webpage to open the command center as a Spotlight-style overlay.</p>
  <p>Type a command (e.g. <strong>gym</strong> or <strong>study</strong>), then Enter to launch the related apps in new tabs. Esc to close.</p>
</body>
</html>
