<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Command Center</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: min(18vh, 160px);
      padding-left: 24px;
      padding-right: 24px;
      cursor: default;
    }
    :root {
      --surface-bg: rgba(255, 255, 255, 0.92);
      --surface-border: rgba(0, 0, 0, 0.04);
      --surface-shadow: 0 24px 48px rgba(0, 0, 0, 0.18);
      --border-subtle: rgba(0, 0, 0, 0.06);
      --text-primary: #1d1d1f;
      --text-muted: rgba(0, 0, 0, 0.5);
      --text-subtle: rgba(0, 0, 0, 0.45);
      --category-bg: rgba(0, 0, 0, 0.03);
      --hint-text: rgba(0, 0, 0, 0.4);
      --row-hover: rgba(0, 0, 0, 0.05);
      --star-color: rgba(0, 0, 0, 0.4);
      --edit-link: #1a73e8;
      --toggle-bg: rgba(0, 0, 0, 0.04);
      --toggle-text: rgba(0, 0, 0, 0.6);
    }
    html[data-theme='dark'] {
      --surface-bg: rgba(15, 23, 42, 0.9);
      --surface-border: rgba(148, 163, 184, 0.4);
      --surface-shadow: 0 24px 48px rgba(15, 23, 42, 0.8);
      --border-subtle: rgba(148, 163, 184, 0.2);
      --text-primary: #e5e7eb;
      --text-muted: rgba(156, 163, 175, 0.9);
      --text-subtle: rgba(148, 163, 184, 0.85);
      --category-bg: rgba(15, 23, 42, 0.85);
      --hint-text: rgba(148, 163, 184, 0.9);
      --row-hover: rgba(148, 163, 184, 0.16);
      --star-color: rgba(250, 204, 21, 0.85);
      --edit-link: #7dd3fc;
      --toggle-bg: rgba(15, 23, 42, 0.9);
      --toggle-text: rgba(226, 232, 240, 0.9);
    }
    .backdrop-close {
      position: fixed;
      inset: 0;
      cursor: default;
      z-index: 0;
    }
    .spotlight-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      border-radius: 12px;
      background: var(--surface-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--surface-shadow), 0 0 0 1px var(--surface-border);
      overflow: hidden;
    }
    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .search-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
    }
    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 18px;
      color: var(--text-primary);
      outline: none;
    }
    .search-input::placeholder {
      color: var(--hint-text);
    }
    .theme-toggle {
      flex-shrink: 0;
      margin-left: 8px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: var(--toggle-bg);
      color: var(--toggle-text);
      padding: 4px 10px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .theme-toggle:hover {
      opacity: 0.9;
    }
    .results {
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: default;
      color: var(--text-primary);
      transition: background 0.12s ease;
    }
    .result-item:hover,
    .result-item.selected {
      background: var(--row-hover);
    }
    .result-item .command {
      font-weight: 500;
      font-size: 15px;
    }
    .result-item .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: 6px;
    }
    .result-item .summary {
      display: block;
      font-size: 12px;
      color: var(--text-subtle);
      margin-top: 2px;
    }
    .result-item {
      position: relative;
    }
    .result-item .star-fav {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: var(--star-color);
      border-radius: 4px;
    }
    .result-item .star-fav:hover {
      background: rgba(245, 158, 11, 0.1);
    }
    .result-item .edit-urls {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--edit-link);
      text-decoration: none;
      opacity: 0.8;
    }
    .result-item .edit-urls:hover { opacity: 1; }
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      font-size: 14px;
      color: var(--text-subtle);
    }
    .hint {
      padding: 10px 16px;
      font-size: 11px;
      color: var(--hint-text);
      border-top: 1px solid var(--border-subtle);
    }
    .category-header {
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--category-bg);
    }
    .category-header:first-child { padding-top: 12px; }
  </style>
</head>
<body>
  <div class="backdrop-close" id="backdrop-close" title="Click to close"></div>
  <div class="spotlight-box">
    <div class="search-row">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" class="search-input" id="search" placeholder="Search commands…" autocomplete="off">
      <button type="button" id="theme-toggle" class="theme-toggle" title="Toggle light / dark theme">
        <span aria-hidden="true">☾</span>
        <span class="theme-toggle-label">Dark</span>
      </button>
    </div>
    <div class="results" id="results"></div>
    <div class="hint" id="hint">↑↓ to move · Enter to launch · Esc to close</div>
  </div>
  <script src="commands-data.js"></script>
  <script src="command-center.js"></script>
</body>
</html>
