<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Command Center</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: min(18vh, 160px);
      padding-left: 24px;
      padding-right: 24px;
      cursor: default;
    }
    .backdrop-close {
      position: fixed;
      inset: 0;
      cursor: default;
      z-index: 0;
    }
    .spotlight-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }
    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .search-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
    }
    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 18px;
      color: #1d1d1f;
      outline: none;
    }
    .search-input::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }
    .results {
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: default;
      color: #1d1d1f;
      transition: background 0.12s ease;
    }
    .result-item:hover,
    .result-item.selected {
      background: rgba(0, 0, 0, 0.05);
    }
    .result-item .command {
      font-weight: 500;
      font-size: 15px;
    }
    .result-item .label {
      font-size: 13px;
      color: rgba(0, 0, 0, 0.5);
      margin-left: 6px;
    }
    .result-item .summary {
      display: block;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.45);
      margin-top: 2px;
    }
    .result-item {
      position: relative;
    }
    .result-item .edit-urls {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #1a73e8;
      text-decoration: none;
      opacity: 0.7;
    }
    .result-item .edit-urls:hover { opacity: 1; }
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.45);
    }
    .hint {
      padding: 10px 16px;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.4);
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }
    .category-header {
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(0, 0, 0, 0.5);
      background: rgba(0, 0, 0, 0.03);
    }
    .category-header:first-child { padding-top: 12px; }
  </style>
</head>
<body>
  <div class="backdrop-close" id="backdrop-close" title="Click to close"></div>
  <div class="spotlight-box">
    <div class="search-row">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" class="search-input" id="search" placeholder="Search commands…" autocomplete="off">
    </div>
    <div class="results" id="results"></div>
    <div class="hint" id="hint">↑↓ to move · Enter to launch · Esc to close</div>
  </div>
  <script src="commands-data.js"></script>
  <script src="command-center.js"></script>
</body>
</html>
